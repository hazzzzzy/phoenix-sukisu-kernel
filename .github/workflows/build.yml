name: Build Phoenix SukiSU Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-22.04
    env:
      KERNEL_REPO: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
      KERNEL_BRANCH: phoenix-r-oss
      DEFCONFIG: vendor/phoenix_user_defconfig
      ARCH: arm64
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git libelf-dev libncurses5-dev libssl-dev \
            lld make rsync zip unzip cpio python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Shallow clone phoenix-r-oss kernel
        run: |
          git clone --depth=1 -b "$KERNEL_BRANCH" "$KERNEL_REPO" kernel
          cd kernel
          echo "kernel HEAD: $(git rev-parse HEAD)"
          head -5 Makefile

      - name: Fetch Proton Clang toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain/clang

      - name: Fetch AOSP GCC (arm64 + arm)
        run: |
          # 4.14 内核链接阶段还需要 aarch64-linux-android-ld 等 binutils
          git clone --depth=1 -b android-10.0.0_r47 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            toolchain/gcc-arm64
          git clone --depth=1 -b android-10.0.0_r47 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            toolchain/gcc-arm

      - name: Integrate SukiSU Ultra (kprobe hook mode)
        working-directory: kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          echo "--- KernelSU/ 内容 ---"
          ls KernelSU/kernel | head -20
          echo "--- drivers/Makefile 是否已挂载 kernelsu ---"
          grep kernelsu drivers/Makefile || (echo "FAIL: setup.sh 没改 drivers/Makefile" && exit 1)

      - name: Apply susfs4ksu (kernel-4.14)
        working-directory: kernel
        run: |
          git clone --depth=1 -b kernel-4.14 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu
          # 拷贝 susfs 的新文件到内核树
          cp ../susfs4ksu/kernel_patches/fs/susfs.c    fs/
          cp ../susfs4ksu/kernel_patches/fs/sus_su.c   fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h      include/linux/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs_def.h  include/linux/
          cp ../susfs4ksu/kernel_patches/include/linux/sus_su.h     include/linux/
          # 打主 patch（允许 fuzz=3 吸收高通魔改带来的小偏移）
          patch -p1 -F 3 --no-backup-if-mismatch < ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch | tee /tmp/susfs_apply.log
          # 失败 hunk 检查
          if grep -q "FAILED" /tmp/susfs_apply.log; then
            echo "==== SUSFS patch 有 hunk 失败，拉 .rej 看下 ===="
            find . -name "*.rej" -exec sh -c 'echo "---$1---"; cat "$1"' _ {} \;
            exit 1
          fi
          echo "susfs patch 应用完成"

      - name: Patch defconfig (开启 KSU + KPM + KPROBES + SUSFS)
        working-directory: kernel
        run: |
          D="arch/arm64/configs/${DEFCONFIG}"
          echo "--- 前置状态 ---"
          grep -E "CONFIG_KPROBES|CONFIG_KALLSYMS|CONFIG_KSU|CONFIG_KPM|CONFIG_EXT4_FS" "$D" || true

          # 工具函数：set_kv KEY VAL —— 存在则替换，不存在则追加
          set_kv() {
            local key=$1 val=$2
            if grep -qE "^(# )?${key}[= ]" "$D"; then
              sed -i -E "s|^(# )?${key}.*$|${key}=${val}|" "$D"
            else
              echo "${key}=${val}" >> "$D"
            fi
          }

          set_kv CONFIG_KPROBES y
          set_kv CONFIG_KPROBE_EVENTS y
          set_kv CONFIG_HAVE_KPROBES y
          set_kv CONFIG_KALLSYMS y
          set_kv CONFIG_KALLSYMS_ALL y
          set_kv CONFIG_KSU y
          set_kv CONFIG_KPM y
          set_kv CONFIG_MODULES y
          set_kv CONFIG_MODULE_UNLOAD y

          # --- SUSFS ---
          set_kv CONFIG_KSU_SUSFS y
          set_kv CONFIG_KSU_SUSFS_SUS_PATH y
          set_kv CONFIG_KSU_SUSFS_SUS_MOUNT y
          set_kv CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT y
          set_kv CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT y
          set_kv CONFIG_KSU_SUSFS_SUS_KSTAT y
          set_kv CONFIG_KSU_SUSFS_SUS_OVERLAYFS y
          set_kv CONFIG_KSU_SUSFS_TRY_UMOUNT y
          set_kv CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT y
          set_kv CONFIG_KSU_SUSFS_SPOOF_UNAME y
          set_kv CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG y
          set_kv CONFIG_KSU_SUSFS_OPEN_REDIRECT y
          set_kv CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS y

          echo "--- 后置状态 ---"
          grep -E "CONFIG_KPROBES|CONFIG_KALLSYMS|CONFIG_KSU|CONFIG_KPM|CONFIG_EXT4_FS" "$D"

      - name: Build kernel
        working-directory: kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc-arm64/bin:$GITHUB_WORKSPACE/toolchain/gcc-arm/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions

          MAKE_ARGS=(
            O=out
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
            CLANG_TRIPLE=aarch64-linux-gnu-
          )

          make "${MAKE_ARGS[@]}" "${DEFCONFIG}"

          # 打印最终 .config 里的关键开关
          echo "=== final .config sanity ==="
          grep -E "^(CONFIG_KSU|CONFIG_KPM|CONFIG_KPROBES|CONFIG_KALLSYMS_ALL|CONFIG_EXT4_FS|CONFIG_KSU_SUSFS)" out/.config || true

          make -j"$(nproc)" "${MAKE_ARGS[@]}" 2>&1 | tee build.log

      - name: Locate build artifacts
        working-directory: kernel
        run: |
          ls -la out/arch/arm64/boot/ || true
          for f in Image.gz-dtb Image-dtb Image.gz Image; do
            if [ -f "out/arch/arm64/boot/$f" ]; then
              echo "FOUND: $f"
              cp "out/arch/arm64/boot/$f" "$GITHUB_WORKSPACE/$f"
            fi
          done

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-sukisu-kernel
          path: |
            Image*
            kernel/build.log
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          if-no-files-found: ignore
